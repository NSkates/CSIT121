<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!--the form must include:
Name, email address, text comment field and use form elements that ask three more questions questions related to the tierlist
must include at least five different form elements.-->
    <header>
        <h1>Lab 7</h1>
    </header>
    <nav>
        <a href="contact.html">Contact</a>
        <a href="tierlist.html">Tier List</a>
        <hr>
    </nav>
    <section>
        <h2>Got any questions? Don't Hesitate to contact me!</h2>
        <p>Please fill out the form below and I will get back to you as soon as possible.</p>
        <form action="#" method="get">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="comment">Comment:</label><br>
            <textarea id="comment" name="comment" rows="4" cols="50"></textarea><br><br>

            <label for="question1">What is your favorite tier?</label>
            <select id="question1" name="question1">
                <option value="S">S</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select><br><br>

            <label for="question2">How many classes have you taken?</label>
            <input type="number" id="question2" name="question2" min="0"><br><br>

            <p>Would you recommend this tier list to others?</p>
            <label>
                <input type="radio" name="question3" value="yes"> Yes
            </label>
            <label>
                <input type="radio" name="question3" value="no"> No
            </label>
            <br><br>
            <input type="submit" value="Submit">
        </form>
    </section>
    
</body>
</html>
